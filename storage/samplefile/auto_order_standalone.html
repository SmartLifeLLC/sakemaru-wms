<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自動発注</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    @media print {
      @page { size: A4; margin: 10mm; }
      body { margin: 0; padding: 10px; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div x-data="autoOrderApp()" x-cloak class="p-4 md:p-6 font-sans text-slate-900">
    <div class="space-y-6">
      <!-- Header -->
      <header class="flex items-center justify-between flex-wrap gap-4">
        <h1 class="text-2xl md:text-3xl font-extrabold text-blue-700" x-text="getPageTitle()"></h1>
        <div class="flex items-center gap-2 md:gap-3 text-sm flex-wrap">
          <template x-if="!showDetail">
            <div class="flex items-center gap-2 flex-wrap">
              <template x-if="activeTab === 'list'">
                <div class="flex items-center gap-2 flex-wrap">
                  <button @click="handleAddNewPO()" class="inline-flex items-center gap-1 rounded-xl border border-blue-600 bg-blue-600 text-white px-3 py-2 hover:bg-blue-700 shadow-sm text-sm">+ 追加</button>
                  <button class="inline-flex items-center gap-1 rounded-xl border border-slate-300 bg-white px-3 py-2 hover:bg-slate-100 shadow-sm text-sm">今すぐ再集計</button>
                  <button @click="handleBulkPrintPO()" :disabled="selectedPOs.length === 0" class="inline-flex items-center gap-1 rounded-xl border border-green-600 bg-green-600 text-white px-3 py-2 hover:bg-green-700 disabled:bg-green-300 disabled:cursor-not-allowed shadow-sm text-sm">発注書出力<span x-show="selectedPOs.length > 0" x-text="' (' + selectedPOs.length + ')'"></span></button>
                  <button @click="handleBulkSend()" :disabled="selectedPOs.length === 0" class="inline-flex items-center gap-1 rounded-xl border border-emerald-600 bg-emerald-600 text-white px-3 py-2 hover:bg-emerald-700 disabled:bg-emerald-300 disabled:cursor-not-allowed shadow-sm text-sm">送信<span x-show="selectedPOs.length > 0" x-text="' (' + selectedPOs.length + ')'"></span></button>
                  <button @click="handleBulkConfirm()" :disabled="selectedPOs.length === 0 || !list.some(po => selectedPOs.includes(po.id) && po.status === '送信済' && !po.isConfirmed)" class="inline-flex items-center gap-1 rounded-xl border border-purple-600 bg-purple-600 text-white px-3 py-2 hover:bg-purple-700 disabled:bg-purple-300 disabled:cursor-not-allowed shadow-sm text-sm">確定<span x-show="selectedPOs.length > 0" x-text="' (' + selectedPOs.length + ')'"></span></button>
                  <button @click="handleExportCSV()" class="inline-flex items-center gap-1 rounded-xl border border-slate-300 bg-white px-3 py-2 hover:bg-slate-100 shadow-sm text-sm">CSV出力</button>
                </div>
              </template>
              <template x-if="activeTab === 'purchase'">
                <button @click="handleAddNewPurchase()" class="inline-flex items-center gap-1 rounded-xl border border-blue-600 bg-blue-600 text-white px-3 py-2 hover:bg-blue-700 shadow-sm text-sm">+ 追加</button>
              </template>
            </div>
          </template>
          <template x-if="showDetail && !isPopupMode">
            <button @click="showDetail = false; selectedPO = null; isCreatingNew = false" class="inline-flex items-center gap-2 rounded-xl border border-slate-300 bg-white px-3 py-2 hover:bg-slate-100 shadow-sm">◀ 一覧へ</button>
          </template>
        </div>
      </header>

      <!-- Tab Navigation -->
      <template x-if="!showDetail || isPopupMode">
        <div class="w-full">
          <div class="flex gap-2 border-b overflow-x-auto">
            <template x-for="tab in tabs" :key="tab.key">
              <button @click="activeTab = tab.key" :class="activeTab === tab.key ? 'border-blue-600 text-blue-700 font-semibold' : 'border-transparent text-slate-500 hover:text-slate-700'" class="px-4 py-2 -mb-px border-b-2 whitespace-nowrap" x-text="tab.label"></button>
            </template>
          </div>
        </div>
      </template>

      <!-- ==================== List View ==================== -->
      <template x-if="!showDetail && activeTab === 'list'">
        <div class="space-y-4">
          <!-- Filter Section -->
          <div class="bg-white rounded-2xl shadow-lg p-4">
            <div class="flex items-center justify-between mb-3 border-b pb-2">
              <div class="text-slate-600 text-sm font-semibold">一覧フィルタリング</div>
            </div>
            <div class="space-y-4">
              <div class="grid md:grid-cols-8 grid-cols-2 gap-4 items-end">
                <div class="relative md:col-span-2">
                  <svg class="w-4 h-4 absolute left-3 top-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                  <input x-model="filters.keyword" type="text" placeholder="キーワード（ID/仕入先/倉庫）" class="w-full h-[42px] rounded-xl border pl-10 pr-3 py-2.5 bg-white shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm">
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-xs text-slate-500 font-medium px-1">発注日（自）</label>
                  <input x-model="filters.orderDateFrom" type="date" class="w-full h-[42px] rounded-xl border border-slate-300 px-3 py-2 bg-white shadow-sm text-sm">
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-xs text-slate-500 font-medium px-1">発注日（至）</label>
                  <input x-model="filters.orderDateTo" type="date" class="w-full h-[42px] rounded-xl border border-slate-300 px-3 py-2 bg-white shadow-sm text-sm">
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-xs text-slate-500 font-medium px-1">入荷予定日（自）</label>
                  <input x-model="filters.etaDateFrom" type="date" class="w-full h-[42px] rounded-xl border border-slate-300 px-3 py-2 bg-white shadow-sm text-sm">
                </div>
                <div class="flex flex-col gap-1">
                  <label class="text-xs text-slate-500 font-medium px-1">入荷予定日（至）</label>
                  <input x-model="filters.etaDateTo" type="date" class="w-full h-[42px] rounded-xl border border-slate-300 px-3 py-2 bg-white shadow-sm text-sm">
                </div>
                <select x-model="filters.warehouse" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">倉庫（すべて）</option>
                  <template x-for="w in warehouses" :key="w.id"><option :value="w.id" x-text="w.name"></option></template>
                </select>
                <select x-model="filters.vendor" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">仕入先（すべて）</option>
                  <template x-for="v in vendors" :key="v.id"><option :value="v.id" x-text="v.name"></option></template>
                </select>
              </div>
              <div class="grid md:grid-cols-8 grid-cols-2 gap-4 items-end">
                <select x-model="filters.status" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">状態（すべて）</option>
                  <option value="送信待ち">送信待ち</option>
                  <option value="送信中">送信中</option>
                  <option value="送信済">送信済</option>
                  <option value="取消">取消</option>
                </select>
                <select x-model="filters.edi" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">EDI（すべて）</option>
                  <option value="無">無</option>
                  <option value="EOS">EOS</option>
                </select>
                <select x-model="filters.confirmStatus" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">確定状況（すべて）</option>
                  <option value="未確定">未確定</option>
                  <option value="一部確定">一部確定</option>
                </select>
                <select x-model="filters.receiptSetting" class="h-[42px] rounded-xl border border-slate-300 px-3 py-2.5 bg-white shadow-sm appearance-none text-sm">
                  <option value="ALL">入荷設定（すべて）</option>
                  <option value="即入荷">即入荷</option>
                  <option value="入荷保留">入荷保留</option>
                </select>
              </div>
              <template x-if="selectedPOs.length > 0">
                <div class="flex items-center gap-3 bg-blue-50 border border-blue-200 rounded-xl p-3">
                  <span class="text-sm font-medium text-blue-700" x-text="selectedPOs.length + '件選択中'"></span>
                  <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-600">状態を一括変更:</span>
                    <button @click="handleBulkStatusChange('送信待ち')" class="rounded-lg bg-blue-100 text-blue-700 px-3 py-1 text-xs hover:bg-blue-200">送信待ち</button>
                    <button @click="handleBulkStatusChange('送信中')" class="rounded-lg bg-yellow-100 text-yellow-700 px-3 py-1 text-xs hover:bg-yellow-200">送信中</button>
                    <button @click="handleBulkStatusChange('送信済')" class="rounded-lg bg-green-100 text-green-700 px-3 py-1 text-xs hover:bg-green-200">送信済</button>
                    <button @click="handleBulkStatusChange('取消')" class="rounded-lg bg-red-100 text-red-700 px-3 py-1 text-xs hover:bg-red-200">取消</button>
                  </div>
                </div>
              </template>
            </div>
          </div>

          <!-- Order List Table -->
          <div class="bg-white rounded-2xl shadow-lg overflow-hidden">
            <div class="overflow-x-auto">
              <table class="w-full text-sm min-w-[1400px]">
                <thead class="bg-slate-100 text-slate-600 border-b border-slate-200 sticky top-0">
                  <tr>
                    <th class="px-4 py-3 text-center whitespace-nowrap">
                      <input type="checkbox" @change="toggleSelectAll()" :checked="selectedPOs.length === filteredList.length && filteredList.length > 0" class="w-4 h-4 rounded border-slate-300 cursor-pointer">
                    </th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">識別ID</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">発注日</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">入荷予定日</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">倉庫</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">発注先</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">仕入先</th>
                    <th class="px-4 py-3 text-right whitespace-nowrap">明細数</th>
                    <th class="px-4 py-3 text-right whitespace-nowrap">金額（税込）</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">状態</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">EDI区分</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">自動発注</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">発注書発行</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">確定状況</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">入荷設定</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">ロット条件</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">作成者</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">作成日時</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">更新者</th>
                    <th class="px-4 py-3 text-left whitespace-nowrap">更新日時</th>
                    <th class="px-4 py-3 text-center whitespace-nowrap">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="po in filteredList" :key="po.id">
                    <tr class="border-t hover:bg-slate-50 cursor-pointer" @click="openPopup(po)">
                      <td class="px-4 py-3 text-center" @click.stop>
                        <input type="checkbox" :checked="selectedPOs.includes(po.id)" @change="toggleSelectPO(po.id)" class="w-4 h-4 rounded border-slate-300 cursor-pointer">
                      </td>
                      <td class="px-4 py-3 font-mono text-blue-700 font-semibold whitespace-nowrap" x-text="po.id"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="po.orderDate"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="po.etaDate"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="getWarehouseName(po.warehouseId)"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="getVendorName(po.vendorId)"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="getVendorName(po.vendorId)"></td>
                      <td class="px-4 py-3 text-right whitespace-nowrap" x-text="po.lines.length"></td>
                      <td class="px-4 py-3 text-right font-bold text-lg text-red-700 whitespace-nowrap" x-text="fmtYen(summarizeTax(po).gross)"></td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span :class="getStatusClass(po.status)" class="inline-flex items-center rounded-full border px-2 py-0.5 text-xs font-medium" x-text="po.status"></span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="po.edi"></td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="po.isAuto ? '自動' : '手動'"></td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span x-show="po.isPrinted" class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-green-100 text-green-700 text-xs font-medium">発行済み</span>
                        <span x-show="!po.isPrinted" class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-slate-100 text-slate-600 text-xs font-medium">未発行</span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span x-show="po.memo && po.memo.includes('一部入荷済み')" class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-yellow-100 text-yellow-700 text-xs font-medium">一部確定</span>
                        <span x-show="!po.memo || !po.memo.includes('一部入荷済み')" class="inline-flex items-center gap-1 px-2 py-1 rounded-md bg-slate-100 text-slate-600 text-xs font-medium">未確定</span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap">
                        <span x-show="po.immediateReceipt" class="px-2 py-1 rounded-md bg-blue-100 text-blue-700 text-xs font-medium">即入荷</span>
                        <span x-show="!po.immediateReceipt" class="px-2 py-1 rounded-md bg-orange-100 text-orange-700 text-xs font-medium">保留</span>
                      </td>
                      <td class="px-4 py-3 whitespace-nowrap" x-text="po.lotCondition || '-'"></td>
                      <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-600" x-text="po.createdBy || '-'"></td>
                      <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-600" x-text="po.createdAt ? po.createdAt.replace('T', ' ') : '-'"></td>
                      <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-600" x-text="po.updatedBy || '-'"></td>
                      <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-600" x-text="po.updatedAt ? po.updatedAt.replace('T', ' ') : '-'"></td>
                      <td class="px-4 py-3" @click.stop>
                        <div class="flex items-center justify-end gap-2 whitespace-nowrap min-w-[280px]">
                          <template x-if="po.status === '送信済'">
                            <button @click="handleOpenConfirmModal(po)" class="inline-flex items-center gap-1 rounded-lg border border-purple-600 px-2 py-1 bg-white text-purple-600 hover:bg-purple-50 whitespace-nowrap text-xs">確定</button>
                          </template>
                          <button @click="openDetail(po)" class="inline-flex items-center gap-1 rounded-lg border px-2 py-1 bg-white text-blue-600 hover:bg-blue-50 border-slate-300 whitespace-nowrap text-xs">編集</button>
                          <template x-if="po.status !== '送信済' && po.status !== '送信中'">
                            <button @click="handleDeletePO(po.id)" class="inline-flex items-center gap-1 rounded-lg border px-2 py-1 bg-white text-red-600 hover:bg-red-50 border-slate-300 whitespace-nowrap text-xs">削除</button>
                          </template>
                        </div>
                      </td>
                    </tr>
                  </template>
                  <template x-if="filteredList.length === 0">
                    <tr><td colspan="21" class="px-4 py-8 text-center text-slate-500">データがありません</td></tr>
                  </template>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </template>

      <!-- ==================== Plan Tab ==================== -->
      <template x-if="!showDetail && activeTab === 'plan'">
        <div class="space-y-4">
          <div class="bg-white rounded-2xl shadow-lg p-4">
            <div class="flex items-center justify-between mb-3 border-b pb-2">
              <div class="text-slate-600 text-sm font-semibold">期間・条件</div>
              <span class="text-xs text-slate-500">倉庫/仕入先は発注先の想定</span>
            </div>
            <div class="grid md:grid-cols-8 grid-cols-2 gap-3">
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">期間（自）</label>
                <input x-model="planFilters.periodFrom" type="date" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">期間（至）</label>
                <input x-model="planFilters.periodTo" type="date" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">大分類</label>
                <select x-model="planFilters.catL" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
                  <option value="ALL">ALL</option>
                  <template x-for="c in categories.L" :key="c"><option :value="c" x-text="c"></option></template>
                </select>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">中分類</label>
                <select x-model="planFilters.catM" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
                  <option value="ALL">ALL</option>
                  <template x-for="c in categories.M" :key="c"><option :value="c" x-text="c"></option></template>
                </select>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">小分類</label>
                <select x-model="planFilters.catS" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
                  <option value="ALL">ALL</option>
                  <template x-for="c in categories.S" :key="c"><option :value="c" x-text="c"></option></template>
                </select>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">倉庫</label>
                <select x-model="planFilters.warehouse" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
                  <template x-for="w in warehouses" :key="w.id"><option :value="w.id" x-text="w.name"></option></template>
                </select>
              </div>
              <div class="flex flex-col gap-1">
                <label class="text-xs text-slate-500 font-medium">仕入先（発注先）</label>
                <select x-model="planFilters.vendor" class="w-full rounded-xl border border-slate-300 px-3 py-2 bg-white text-sm">
                  <option value="NONE">指定なし</option>
                  <template x-for="v in vendors" :key="v.id"><option :value="v.id" x-text="v.name"></option></template>
                </select>
              </div>
              <div class="flex items-end">
                <button @click="handleAggregate()" class="inline-flex items-center gap-2 rounded-xl bg-blue-600 text-white px-4 py-2 hover:bg-blue-700 shadow text-sm">実績集計</button>
              </div>
            </div>
          </div>

          <!-- Product List -->
          <div class="bg-white rounded-2xl shadow-lg p-4">
            <div class="flex items-center justify-between mb-3 border-b pb-2">
              <div class="text-slate-600 text-sm font-semibold">商品実績</div>
            </div>
            <div class="overflow-x-auto overflow-y-auto relative" style="max-height: 336px;">
              <table class="w-full text-sm min-w-[1400px]">
                <thead class="bg-slate-100 text-slate-600 sticky top-0 z-20">
                  <tr>
                    <th class="px-3 py-2 text-left whitespace-nowrap">品番</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">商品名</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">規格</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">大分類</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">中分類</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">小分類</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">倉庫</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap">期間販売数</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap">現在庫(総バラ)</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap">1日平均</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">発注先</th>
                    <th class="px-3 py-2 text-left whitespace-nowrap">標準仕入先</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap">LT(日)</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap">発注点</th>
                    <th class="px-3 py-2 text-right whitespace-nowrap bg-slate-100" style="position: sticky; right: 328px; z-index: 10; min-width: 120px; box-shadow: -2px 0 4px rgba(0,0,0,0.1);">自動発注数</th>
                    <th class="px-2 py-2 text-right whitespace-nowrap bg-slate-100" style="position: sticky; right: 208px; z-index: 10; min-width: 120px;">発注ケース</th>
                    <th class="px-2 py-2 text-right whitespace-nowrap bg-slate-100" style="position: sticky; right: 88px; z-index: 10; min-width: 120px;">発注バラ</th>
                    <th class="px-2 py-2 text-right whitespace-nowrap bg-slate-100" style="position: sticky; right: 0px; z-index: 10; min-width: 88px;">操作</th>
                  </tr>
                </thead>
                <tbody>
                  <template x-for="row in planRows" :key="row.productId">
                    <tr class="border-t">

    handleOpenConfirmModal(po) {
      this.confirmingPO = JSON.parse(JSON.stringify(po));
      this.receivedLines = po.lines.map(line => {
        const p = this.products.find(x => x.id === line.productId);
        const casePack = p?.casePack || 1;

    handleBulkConfirm() {
      if (this.selectedPOs.length === 0) { alert('確定する発注を選択してください'); return; }
      const confirmablePOs = this.list.filter(po => this.selectedPOs.includes(po.id) && po.status === '送信済' && !po.isConfirmed);
      if (confirmablePOs.length === 0) { alert('確定可能な発注（状態が「送信済」かつ未確定）がありません'); return; }
      if (!confirm(`${confirmablePOs.length}件の発注を確定します。全数入荷として処理されます。よろしいですか？`)) return;
      const now = new Date().toISOString().slice(0, 19);
      const newPurchases = confirmablePOs.map(po => ({
        ...JSON.parse(JSON.stringify(po)),
        id: `PUR-${po.id}`,
        sourceOrderId: po.id,
        status: '送信済',
        createdAt: now,
        updatedAt: now,
        memo: `発注ID:${po.id}より全数入荷`
      }));
      this.list = this.list.filter(po => !(this.selectedPOs.includes(po.id) && po.status === '送信済' && !po.isConfirmed));
      this.list = [...newPurchases, ...this.list];
      this.selectedPOs = [];
      alert(`${confirmablePOs.length}件の発注を確定しました`);
    },
    handleConfirmPurchase() {
      if (!this.confirmingPO) return;
      const now = new Date().toISOString().slice(0, 19);
      const receivedLinesData = this.receivedLines.map(rl => {
        const origLine = this.confirmingPO.lines.find(l => l.id === rl.id);
        return { ...origLine, qtyCase: rl.receivedCase, qtyEach: rl.receivedEach };
      }).filter(l => l.qtyCase > 0 || l.qtyEach > 0);
      if (receivedLinesData.length === 0) { alert('入荷数量を入力してください'); return; }
      const newPurchase = {
        ...JSON.parse(JSON.stringify(this.confirmingPO)),
        id: `PUR-${this.confirmingPO.id}-${Date.now()}`,
        sourceOrderId: this.confirmingPO.id,
        status: '送信済',
        lines: receivedLinesData,
        createdAt: now,
        updatedAt: now,
        memo: this.confirmRemarks || `発注ID:${this.confirmingPO.id}より入荷`
      };
      const remainingLines = this.confirmingPO.lines.map(origLine => {
        const received = this.receivedLines.find(rl => rl.id === origLine.id);
        if (!received) return origLine;
        const p = this.products.find(x => x.id === origLine.productId);
        const casePack = p?.casePack || 1;
        const origTotal = origLine.qtyCase * casePack + origLine.qtyEach;
        const recTotal = received.receivedCase * casePack + received.receivedEach;
        const remainTotal = origTotal - recTotal;
        if (remainTotal <= 0) return null;
        return { ...origLine, qtyCase: Math.floor(remainTotal / casePack), qtyEach: remainTotal % casePack };
      }).filter(l => l !== null);
      this.list = this.list.map(po => {
        if (po.id === this.confirmingPO.id) {
          if (remainingLines.length > 0) {
            return { ...po, lines: remainingLines, memo: '一部入荷済み', updatedAt: now };
          } else {
            return { ...po, isConfirmed: true, updatedAt: now };
          }
        }
        return po;
      });
      this.list = this.list.filter(po => !(po.id === this.confirmingPO.id && po.isConfirmed));
      this.list.unshift(newPurchase);
      this.showConfirmModal = false;
      this.confirmingPO = null;
      this.receivedLines = [];
      this.confirmRemarks = '';
      alert('入荷確定処理が完了しました');

    handleAddProduct() { this.addProductError = ''; if (!this.addProduct.productId) { this.addProductError = '商品を選択してください'; return; } if (this.addProduct.qtyCase === 0 && this.addProduct.qtyEach === 0) { this.addProductError = 'ケース数またはバラ数を入力してください'; return; } const newLine = { id: `L-${Date.now()}`, productId: this.addProduct.productId, qtyCase: this.addProduct.qtyCase, qtyEach: this.addProduct.qtyEach }; if (this.selectedPO) this.selectedPO.lines.push(newLine); else if (this.popupPO) this.popupPO.lines.push(newLine); this.showAddProductModal = false; this.addProduct = { productId: '', qtyCase: 0, qtyEach: 0 }; this.addProductError = ''; },
    handleAggregate() { const days = Math.max(1, Math.floor((new Date(this.planFilters.periodTo) - new Date(this.planFilters.periodFrom)) / (1000 * 60 * 60 * 24)) + 1); const base = { "1": 8, "2": 5, "3": 2, "4": 12, "5": 10, "6": 15, "7": 4, "8": 3, "9": 8, "10": 6, "11": 5, "12": 4, "13": 7, "14": 6, "15": 9, "16": 5, "17": 12, "18": 8, "19": 3, "20": 4 }; const wh = this.warehouses.find(w => w.id === this.planFilters.warehouse); this.planRows = this.products.filter(p => { const cat = this.productCategories[p.id]; if (!cat) return false; if (this.planFilters.catL !== 'ALL' && cat.L !== this.planFilters.catL) return false; if (this.planFilters.catM !== 'ALL' && cat.M !== this.planFilters.catM) return false; if (this.planFilters.catS !== 'ALL' && cat.S !== this.planFilters.catS) return false; return true; }).map(p => { const soldEach = (base[p.id] || 1) * days; const avg = soldEach / days; const stock = this.currentStocks[p.id] || 0; const autoOrderQty = this.productAutoOrderQty[p.id]?.[this.planFilters.warehouse] || 0; const stdVendorId = this.productStandardVendor[p.id]; const stdVendor = this.vendors.find(v => v.id === stdVendorId); const orderVendorId = this.planFilters.vendor === 'NONE' ? stdVendorId : this.planFilters.vendor; const orderVendor = this.vendors.find(v => v.id === orderVendorId); const leadTime = this.vendorLeadTimeDays[stdVendorId] || 0; const orderPoint = Math.ceil(avg * leadTime); const cat = this.productCategories[p.id] || {}; return { productId: p.id, code: p.code, name: p.name, spec: p.spec, soldEach, stockEach: stock, avgDaily: avg.toFixed(2), autoOrderQty, stdVendorName: stdVendor?.name || '-', orderVendorName: orderVendor?.name || '-', leadTime, orderPoint, warehouseName: wh?.name || '', catL: cat.L || '', catM: cat.M || '', catS: cat.S || '', orderCase: 0, orderEach: 0 }; }); },

    createOrder() { if (this.staging.length === 0) return; const newId = `${Date.now()}`; const now = new Date().toISOString().slice(0, 19); const lines = this.staging.map((s, idx) => ({ id: `PL${idx + 1}`, productId: s.productId, qtyCase: s.qtyCase, qtyEach: s.qtyEach })); const vendorId = this.planFilters.vendor === 'NONE' ? 'V1' : this.planFilters.vendor; const eta = addBizDays(todayStr(), this.vendorLeadTimeDays[vendorId] || 3); const newPO = { id: newId, orderDate: todayStr(), etaDate: eta, warehouseId: this.planFilters.warehouse, vendorId: vendorId, status: '送信待ち', edi: '無', isAuto: false, lines: lines, createdAt: now, createdBy: 'システム', updatedAt: now, updatedBy: 'システム', postingDate: todayStr(), payableDate: todayStr(), rebateDate: todayStr(), tradeType: '0:通常', deliveryType: '0:買掛', slipNo: '', memo: `期間実績(${this.planFilters.periodFrom}〜${this.planFilters.periodTo})参照`, memoCode: '', lotCondition: 'なし', immediateReceipt: false, receiptOnHold: true, isPrinted: false }; this.list.unshift(newPO); this.staging = []; this.planRows = this.planRows.map(r => ({ ...r, orderCase: 0, orderEach: 0 })); alert('発注を作成しました'); this.activeTab = 'list'; }
